# Name of this workflow
name: Go Lint & Test

# Triggered on pull request and push events for any branch
on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - "**"

# Defining jobs
jobs:
  # Lint job for Go code
  lint:
    name: Lint Go Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Upgraded to v4 for Node.js compatibility
      - name: Set up Go
        uses: actions/setup-go@v6 # Upgraded to v6 (supports Node 24 & Go 1.25 toolchains)
        with:
          go-version: '1.25.4' # Sets up Go 1.25.4
          cache: true # Enables automatic caching for Go modules
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9 # Upgraded to v9 (required for v2 linters)
        with:
          version: latest # Installs the latest v2.x linter which supports Go 1.25 syntax

  # Test job for Go on Linux with Go 1.25.4
  test:
    name: Test on Linux with Go 1.25.4
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v6 # Upgraded to v6
        with:
          go-version: '1.25.4' # Sets up Go 1.25.4
          cache: true
      - uses: actions/checkout@v4 # Upgraded to v4
      - name: Test
        run: go test -v ./... # Runs Go tests
